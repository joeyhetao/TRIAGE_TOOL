<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>仿真日志分类分诊工具</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="page-wrap">
  <div class="top-bar">
    <span class="tool-title">🔍 仿真日志分类分诊工具</span>
    <span class="tool-sub">Simulation Log Triage Tool</span>
  </div>

  <div class="card upload-card">
    <h2 class="card-title">上传仿真日志</h2>

    <!-- 模式切换 Tab -->
    <div class="mode-tabs">
      <button class="mode-tab active" id="tabUpload" onclick="switchMode('upload')">
        ⬆ 上传文件
      </button>
      <button class="mode-tab" id="tabPath" onclick="switchMode('path')">
        📂 指定路径
      </button>
      <button class="mode-tab" id="tabQuery" onclick="switchMode('query')">
        🔎 查询知识库
      </button>
      <button class="mode-tab" id="tabAdd" onclick="switchMode('add')">
        ➕ 添加条目
      </button>
    </div>

    <!-- ── 上传文件模式 ─────────────────────────────── -->
    <div id="modeUpload">
      <div class="drop-zone" id="dropZone" onclick="fileInput.click()">
        <div class="drop-icon">📂</div>
        <div class="drop-text">拖拽日志文件到此处，或 <span class="link-btn">点击选择文件</span></div>
        <div class="drop-hint">仅支持 .log 格式，可多选</div>
        <input type="file" id="fileInput" multiple accept=".log" style="display:none">
      </div>
      <div class="file-list" id="fileList"></div>
    </div>

    <!-- ── 指定路径模式 ─────────────────────────────── -->
    <div id="modePath" style="display:none">
      <textarea id="logPaths" class="path-textarea"
                placeholder="输入日志文件路径或 glob 表达式，每行一个，例如：
/home/proj/sim_results/sim.log
/home/proj/regression/**/test/tc_*.log
D:\sim\run1\*.log"></textarea>
      <div class="drop-hint" style="margin-top:6px">
        支持 <code>*</code> 和 <code>**</code> 通配符，多路径每行一个或逗号分隔，最多 5000 个文件
      </div>
    </div>

    <!-- ── 查询知识库模式 ──────────────────────────── -->
    <div id="modeQuery" style="display:none">
      <div class="query-form-grid">
        <div class="qf-item">
          <label class="qf-label">错误类型</label>
          <select id="qLevel" class="fi">
            <option value="">不限</option>
            <option value="UVM_FATAL">UVM_FATAL</option>
            <option value="UVM_ERROR">UVM_ERROR</option>
          </select>
        </div>
        <div class="qf-item">
          <label class="qf-label">错误 ID <span class="hint">支持部分匹配</span></label>
          <input type="text" id="qErrorId" class="fi" placeholder="如：CNTR_OVERFLOW">
        </div>
        <div class="qf-item qf-full">
          <label class="qf-label">描述 / 关键词 <span class="hint">空格或逗号分隔，任意词命中即显示</span></label>
          <input type="text" id="qText" class="fi" placeholder="如：assertion failed timeout expected">
        </div>
      </div>
    </div>

    <!-- ── 添加条目模式 ──────────────────────────────── -->
    <div id="modeAdd" style="display:none">
      <div class="form-grid" style="margin-top:4px">
        <div class="fg-item">
          <label>错误类型 <span class="req">*</span></label>
          <select class="fi" id="addType">
            <option value="UVM_ERROR">UVM_ERROR</option>
            <option value="UVM_FATAL">UVM_FATAL</option>
            <option value="UVM_WARNING">UVM_WARNING</option>
          </select>
        </div>
        <div class="fg-item">
          <label>错误ID</label>
          <input class="fi" id="addErrId" placeholder="如：DATA_MISMATCH">
        </div>
        <div class="fg-item full">
          <label>关键描述关键词 <span class="hint">多个用逗号分隔</span></label>
          <input class="fi" id="addKw" placeholder="如：length mismatch,expected">
        </div>
        <div class="fg-item full">
          <label>报错原因 <span class="req">*</span></label>
          <input class="fi" id="addReason" placeholder="填写根因说明">
        </div>
        <div class="fg-item">
          <label>所属模块</label>
          <input class="fi" id="addModule" placeholder="如：axi_scoreboard">
        </div>
        <div class="fg-item">
          <label>根因分类 <span class="req">*</span></label>
          <select class="fi" id="addCat">
            <option>DUT Bug</option>
            <option>TB Bug</option>
            <option>用例问题</option>
            <option>工具问题</option>
            <option>其他问题</option>
          </select>
        </div>
        <div class="fg-item full">
          <label>解决方案</label>
          <input class="fi" id="addSolution" placeholder="处理建议">
        </div>
        <div class="fg-item">
          <label>关联用例</label>
          <input class="fi" id="addCase" placeholder="用例名称">
        </div>
        <div class="fg-item">
          <label>录入人</label>
          <input class="fi" id="addAuthor" placeholder="姓名">
        </div>
      </div>
    </div>

    <!-- 知识库路径 -->
    <div class="form-row">
      <label class="form-label">📋 知识库路径</label>
      <input type="text" id="dbPath" class="form-input" value="{{ db_default }}" placeholder="error_db.xlsx 路径">
      <label for="dbInput" class="btn btn-secondary">选择文件</label>
      <input type="file" id="dbInput" accept=".xlsx" style="display:none">
    </div>

    <!-- 提交按钮 -->
    <div class="btn-row" id="analyzeBtnRow">
      <button class="btn btn-primary" id="analyzeBtn" onclick="startAnalyze()">
        <span id="btnText">开始分析</span>
        <span id="btnSpinner" class="spinner" style="display:none"></span>
      </button>
    </div>
    <div class="btn-row" id="queryBtnRow" style="display:none">
      <button class="btn btn-primary" id="queryBtn" onclick="runQuery()">
        <span id="qBtnText">查询</span>
        <span id="qBtnSpinner" class="spinner" style="display:none"></span>
      </button>
    </div>
    <div class="btn-row" id="addBtnRow" style="display:none">
      <button class="btn btn-primary" id="addBtn" onclick="submitAdd()">
        <span id="addBtnText">写入知识库</span>
        <span id="addBtnSpinner" class="spinner" style="display:none"></span>
      </button>
      <button class="btn btn-secondary" onclick="clearAddForm()" style="margin-left:8px">清空</button>
    </div>
    <div id="errMsg" class="err-msg"></div>
  </div>

  <!-- 查询结果区 -->
  <div id="queryResultsWrap" style="display:none">
    <div class="card" style="margin-top:16px">
      <div class="card-title" id="queryResultTitle"></div>
      <div id="queryResults"></div>
    </div>
  </div>

</div>

<script>
  const dropZone  = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');
  const fileList  = document.getElementById('fileList');
  const dbInput   = document.getElementById('dbInput');
  const dbPath    = document.getElementById('dbPath');
  let selectedFiles = [];
  let currentMode   = 'upload';

  // ── 模式切换 ──────────────────────────────────────
  function switchMode(mode) {
    currentMode = mode;
    ['upload','path','query','add'].forEach(m => {
      document.getElementById('tab' + m.charAt(0).toUpperCase() + m.slice(1))
              .classList.toggle('active', m === mode);
      document.getElementById('mode' + m.charAt(0).toUpperCase() + m.slice(1))
              .style.display = m === mode ? '' : 'none';
    });
    document.getElementById('analyzeBtnRow').style.display = (mode === 'upload' || mode === 'path') ? '' : 'none';
    document.getElementById('queryBtnRow').style.display   = mode === 'query' ? '' : 'none';
    document.getElementById('addBtnRow').style.display     = mode === 'add'   ? '' : 'none';
    // 知识库路径选择框在「添加条目」模式仍需显示
    document.getElementById('errMsg').textContent = '';
    if (mode !== 'query') document.getElementById('queryResultsWrap').style.display = 'none';
  }

  // ── 上传模式：拖拽 & 文件选择 ─────────────────────
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault(); dropZone.classList.remove('drag-over');
    addFiles(e.dataTransfer.files);
  });
  fileInput.addEventListener('change', () => {
    addFiles(fileInput.files);
    fileInput.value = '';
  });
  dbInput.addEventListener('change', () => { if (dbInput.files[0]) dbPath.value = dbInput.files[0].name; });

  function addFiles(files) {
    const rejected = [];
    for (const f of files) {
      if (f.name.toLowerCase().endsWith('.log')) {
        selectedFiles.push(f);
      } else {
        rejected.push(f.name);
      }
    }
    if (rejected.length) {
      document.getElementById('errMsg').textContent =
        '以下文件不是 .log 格式，已跳过：' + rejected.join('、');
    } else {
      document.getElementById('errMsg').textContent = '';
    }
    renderFileList();
  }

  function removeFile(idx) {
    selectedFiles.splice(idx, 1);
    renderFileList();
  }

  function renderFileList() {
    if (!selectedFiles.length) { fileList.innerHTML = ''; return; }
    fileList.innerHTML = selectedFiles.map((f, i) =>
      `<div class="file-item">
        <span class="file-icon">📄</span>
        <span class="file-name">${f.name}</span>
        <span class="file-size">${(f.size/1024).toFixed(1)} KB</span>
        <span class="file-remove" onclick="removeFile(${i})">✕</span>
      </div>`
    ).join('');
  }

  // ── 提交分析 ──────────────────────────────────────
  async function startAnalyze() {
    document.getElementById('errMsg').textContent = '';

    const formData = new FormData();
    formData.append('db_path', dbPath.value);

    if (currentMode === 'upload') {
      if (!selectedFiles.length) {
        document.getElementById('errMsg').textContent = '请先选择日志文件';
        return;
      }
      selectedFiles.forEach(f => formData.append('logs', f));
    } else {
      const paths = document.getElementById('logPaths').value.trim();
      if (!paths) {
        document.getElementById('errMsg').textContent = '请输入日志文件路径';
        return;
      }
      formData.append('path_mode', '1');
      formData.append('log_paths', paths);
    }

    document.getElementById('btnText').textContent = '分析中...';
    document.getElementById('btnSpinner').style.display = 'inline-block';
    document.getElementById('analyzeBtn').disabled = true;

    try {
      const resp = await fetch('/analyze', { method: 'POST', body: formData });
      const data = await resp.json();
      if (data.redirect) {
        window.location.href = data.redirect;
      } else {
        document.getElementById('errMsg').textContent = data.error || '分析失败';
      }
    } catch(e) {
      document.getElementById('errMsg').textContent = '请求失败：' + e.message;
    } finally {
      document.getElementById('btnText').textContent = '开始分析';
      document.getElementById('btnSpinner').style.display = 'none';
      document.getElementById('analyzeBtn').disabled = false;
    }
  }

  // ── 知识库查询 ────────────────────────────────────
  async function runQuery() {
    document.getElementById('errMsg').textContent = '';
    const level   = document.getElementById('qLevel').value;
    const errorId = document.getElementById('qErrorId').value.trim();
    const text    = document.getElementById('qText').value.trim();

    if (!level && !errorId && !text) {
      document.getElementById('errMsg').textContent = '请至少填写一个查询条件';
      return;
    }

    document.getElementById('qBtnText').textContent = '查询中...';
    document.getElementById('qBtnSpinner').style.display = 'inline-block';
    document.getElementById('queryBtn').disabled = true;

    try {
      const resp = await fetch('/query', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ db_path: dbPath.value, level, error_id: errorId, text }),
      });
      const data = await resp.json();
      if (data.error) {
        document.getElementById('errMsg').textContent = '查询失败：' + data.error;
        return;
      }
      renderQueryResults(data.entries, data.total);
    } catch(e) {
      document.getElementById('errMsg').textContent = '请求失败：' + e.message;
    } finally {
      document.getElementById('qBtnText').textContent = '查询';
      document.getElementById('qBtnSpinner').style.display = 'none';
      document.getElementById('queryBtn').disabled = false;
    }
  }

  // ── 直接添加知识库条目 ────────────────────────────
  async function submitAdd(force) {
    document.getElementById('errMsg').textContent = '';
    document.getElementById('errMsg').style.color = '';
    const reason = document.getElementById('addReason').value.trim();
    if (!reason) {
      document.getElementById('errMsg').textContent = '请填写报错原因';
      document.getElementById('errMsg').style.color = '#C00000';
      return;
    }
    const payload = {
      db_path:       dbPath.value,
      '错误类型':    document.getElementById('addType').value,
      '错误ID':      document.getElementById('addErrId').value.trim(),
      '关键描述关键词': document.getElementById('addKw').value.trim(),
      '报错原因':    reason,
      '所属模块':    document.getElementById('addModule').value.trim(),
      '根因分类':    document.getElementById('addCat').value,
      '解决方案':    document.getElementById('addSolution').value.trim(),
      '关联用例':    document.getElementById('addCase').value.trim(),
      '录入人':      document.getElementById('addAuthor').value.trim(),
    };
    if (force) payload.force = true;
    document.getElementById('addBtnText').textContent = '写入中...';
    document.getElementById('addBtnSpinner').style.display = 'inline-block';
    document.getElementById('addBtn').disabled = true;
    try {
      const resp = await fetch('/kb/add', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(payload),
      });
      const data = await resp.json();
      const errEl = document.getElementById('errMsg');
      if (data.success) {
        errEl.textContent = '✅ 条目已成功写入知识库';
        errEl.style.color = '#2E7D32';
        clearAddForm();
      } else if (data.duplicate) {
        showDuplicateWarning(errEl, data.conflicts, () => submitAdd(true));
      } else {
        errEl.textContent = '写入失败：' + (data.error || '未知错误');
        errEl.style.color = '#C00000';
      }
    } catch(e) {
      document.getElementById('errMsg').textContent = '请求失败：' + e.message;
      document.getElementById('errMsg').style.color = '#C00000';
    } finally {
      document.getElementById('addBtnText').textContent = '写入知识库';
      document.getElementById('addBtnSpinner').style.display = 'none';
      document.getElementById('addBtn').disabled = false;
    }
  }

  function showDuplicateWarning(container, conflicts, onForce) {
    const c = conflicts[0] || {};
    const more = conflicts.length > 1 ? `（共 ${conflicts.length} 条相似）` : '';
    container.innerHTML =
      `<div class="dup-warn">⚠ 知识库中已存在相似条目${more}：` +
      `<span class="dup-field">${esc(c['错误类型']||'')} / ${esc(c['错误ID']||'—')} / ${esc(c['报错原因']||'').slice(0,40)}</span>` +
      `<button class="btn-force" onclick="(${onForce.toString()})()">仍要写入</button>` +
      `<button class="btn-cancel-dup" onclick="this.closest('.dup-warn').parentNode.textContent=''">取消</button>` +
      `</div>`;
    container.style.color = '';
  }

  function clearAddForm() {
    ['addErrId','addKw','addReason','addModule','addSolution','addCase','addAuthor']
      .forEach(id => { document.getElementById(id).value = ''; });
    document.getElementById('addType').value = 'UVM_ERROR';
    document.getElementById('addCat').value  = 'DUT Bug';
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function renderQueryResults(entries, total) {
    const wrap = document.getElementById('queryResultsWrap');
    const title = document.getElementById('queryResultTitle');
    const container = document.getElementById('queryResults');

    if (!entries || entries.length === 0) {
      title.textContent = '未找到匹配条目';
      container.innerHTML = '<div class="empty-box" style="margin:16px 0">知识库中暂无符合条件的记录</div>';
      wrap.style.display = '';
      return;
    }

    const shown = entries.length;
    title.textContent = `查询结果（${total > shown ? '显示前 ' + shown + ' / 共 ' + total : '共 ' + total} 条）`;

    container.innerHTML = entries.map((e, i) => `
      <div class="qr-card">
        <div class="qr-hdr">
          <span class="badge badge-${(e['错误类型']||'').toLowerCase()}">${esc(e['错误类型']||'')}</span>
          <span class="qr-id mono">${esc(e['错误ID']||'—')}</span>
          <span class="qr-module">${esc(e['所属模块']||'')}</span>
          <span class="qr-cat">${esc(e['根因分类']||'')}</span>
        </div>
        <div class="entry-grid" style="margin-top:8px">
          <div class="eg-kv full"><span class="eg-k">关键描述关键词</span><span class="eg-v mono">${esc(e['关键描述关键词']||'')}</span></div>
          <div class="eg-kv full"><span class="eg-k">报错原因</span><span class="eg-v">${esc(e['报错原因']||'')}</span></div>
          <div class="eg-kv full"><span class="eg-k">解决方案</span><span class="eg-v">${esc(e['解决方案']||'')}</span></div>
          <div class="eg-kv"><span class="eg-k">关联用例</span><span class="eg-v mono">${esc(e['关联用例']||'')}</span></div>
          <div class="eg-kv"><span class="eg-k">录入人 / 日期</span><span class="eg-v">${esc(e['录入人']||'')} ${esc(e['录入日期']||'')}</span></div>
        </div>
      </div>`
    ).join('');

    wrap.style.display = '';
    wrap.scrollIntoView({behavior: 'smooth', block: 'start'});
  }
</script>
</body>
</html>
